
services:
  # ==================== 数据层 ====================
  mysql:
    image: mysql:8.0
    container_name: doutok-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: doutok
      MYSQL_USER: doutok
      MYSQL_PASSWORD: doutok123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../backend/migration:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doutok-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ==================== 消息队列 ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: doutok-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zk_data:/var/lib/zookeeper

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: doutok-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka

  # ==================== 对象存储 ====================
  minio:
    image: minio/minio:latest
    container_name: doutok-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: doutok
      MINIO_ROOT_PASSWORD: doutok123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # ==================== 流媒体 (直播) ====================
  srs:
    image: ossrs/srs:5
    container_name: doutok-srs
    restart: unless-stopped
    ports:
      - "1935:1935"   # RTMP
      - "1985:1985"   # HTTP API
      - "8088:8080"   # HTTP-FLV / HLS
    volumes:
      - ./srs.conf:/usr/local/srs/conf/docker.conf

  # ==================== 搜索引擎 ====================
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: doutok-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # ==================== 监控 ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: doutok-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prom_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: doutok-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  mysql_data:
  redis_data:
  zk_data:
  kafka_data:
  minio_data:
  es_data:
  prom_data:
  grafana_data:

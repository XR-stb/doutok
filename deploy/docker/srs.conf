# DouTok SRS 流媒体配置
# 推流: rtmp://localhost:1935/live/{stream_key}
# 拉流: http://localhost:8080/live/{stream_key}.flv (HTTP-FLV, 低延迟)
#        http://localhost:8080/live/{stream_key}/index.m3u8 (HLS)

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

vhost __defaultVhost__ {
    # HTTP-FLV 低延迟推拉流
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # HLS 切片
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      10;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream]/index.m3u8;
        hls_ts_file     [app]/[stream]/[seq].ts;
    }

    # RTMP 播放
    play {
        gop_cache       on;
        queue_length    10;
        mw_latency      100;
    }

    # 推流鉴权回调 (生产环境取消注释)
    # http_hooks {
    #     enabled         on;
    #     on_publish      http://host.docker.internal:8080/api/v1/lives/hook/publish;
    #     on_unpublish    http://host.docker.internal:8080/api/v1/lives/hook/unpublish;
    # }
}
